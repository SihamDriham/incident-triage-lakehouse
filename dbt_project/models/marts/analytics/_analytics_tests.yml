version: 2

models:
  - name: mart_analytics_ops
    description: "Table au grain ticket — 1 ligne par issue SPARK (~49 833 lignes). Agrégations faites en DAX."
    columns:
      - name: key
        tests:
          - unique
          - not_null
      - name: issuetype
        tests:
          - not_null
      - name: priority
        tests:
          - not_null
      - name: is_resolved
        tests:
          - accepted_values:
              values: [0, 1]
      - name: n_comments
        tests:
          - not_null

  - name: mart_analytics_workload
    description: "Charge de travail par assignataire avec backlog ouvert"
    columns:
      - name: assignee
        tests:
          - unique
          - not_null
      - name: n_assigned
        tests:
          - not_null
      - name: n_fixed
        tests:
          - not_null
      - name: n_open_backlog
        tests:
          - not_null

  - name: mart_analytics_links
    description: "Agrégats de liens entre tickets"
    columns:
      - name: key
        tests:
          - unique
          - not_null
      - name: n_links_total
        tests:
          - not_null

  - name: mart_analytics_transitions_sankey
    description: "Transitions agrégées par paire from/to — source Sankey (~12 lignes)"
    columns:
      - name: from_status
        tests:
          - not_null
      - name: to_status
        tests:
          - not_null
      - name: n_transitions
        tests:
          - not_null

  - name: mart_analytics_transitions_time
    description: "Temps moyen par statut — source bar chart durées (~6 lignes)"
    columns:
      - name: status
        tests:
          - unique
          - not_null
      - name: avg_hours
        tests:
          - not_null

  - name: mart_analytics_versions
    description: "Métriques par version Spark cible (1.x/2.x/3.x/4.x) × issuetype"
    columns:
      - name: version_major
        tests:
          - not_null
          - accepted_values:
              values: ['1.x', '2.x', '3.x', '4.x']
      - name: n_issues
        tests:
          - not_null
      - name: bug_ratio_pct
        tests:
          - not_null

  - name: mart_analytics_calendar
    description: "Activité quotidienne avec moyenne mobile 7j et cumul backlog — heatmap calendrier"
    columns:
      - name: activity_date
        tests:
          - unique
          - not_null
      - name: activity_intensity
        tests:
          - not_null
