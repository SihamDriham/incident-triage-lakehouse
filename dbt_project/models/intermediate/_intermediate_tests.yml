version: 2

models:
  - name: int_issues_cleaned
    description: "Issues SPARK nettoyées NLP, labels consolidés, split temporel appliqué"
    columns:
      - name: key
        tests:
          - unique
          - not_null
      - name: created_at
        tests:
          - not_null
      - name: issuetype
        tests:
          - not_null
          - accepted_values:
              values: ['Bug', 'Improvement', 'Sub-task', 'New Feature', 'Task', 'Test', 'Documentation', 'Question', 'Other']
              config:
                severity: warn
      - name: resolution
        tests:
          - not_null
          - accepted_values:
              values: ['Fixed', 'Not A Problem', 'Incomplete', 'Duplicate', 'Invalid', 'Cannot Reproduce', "Won''t Fix"]
              config:
                severity: warn
      - name: split
        tests:
          - not_null
          - accepted_values:
              values: ['train', 'validation', 'excluded']

  - name: int_comments_aggregated
    description: "Commentaires agrégés par issue (texte nettoyé, métriques)"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_issues')
              field: key

  - name: int_changelog_features
    description: "Features changelog par issue (escalade, changements, assignataire)"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('int_issues_cleaned')
              field: key

  - name: int_issuelinks_features
    description: "Features de liens entre tickets par issue"
    columns:
      - name: key
        tests:
          - unique
          - not_null
          - relationships:
              to: ref('stg_issues')
              field: key
